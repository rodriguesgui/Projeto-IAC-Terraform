name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ARM_CLIENT_ID:              ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:          ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID:        ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:              ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_CLI:                "false"
  TF_VAR_subscription_id:     ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_client_id:           ${{ secrets.ARM_CLIENT_ID }}
  TF_VAR_client_secret:       ${{ secrets.ARM_CLIENT_SECRET }}
  TF_VAR_tenant_id:           ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_resource_group_name: "rg-projeto-iac-dev"
  TF_VAR_location:            "brazilsouth"
  TF_VAR_sql_admin_login:     ${{ secrets.SQL_ADMIN_LOGIN }}
  TF_VAR_sql_admin_password:  ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./IaC

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instala Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.2

      - name: Terraform Format
        run: terraform fmt --check

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=stterraformstate12174" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.terraform.tfstate" \
            -backend-config="client_id=${{ secrets.ARM_CLIENT_ID }}" \
            -backend-config="client_secret=${{ secrets.ARM_CLIENT_SECRET }}" \
            -backend-config="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.ARM_TENANT_ID }}"

      - name: Terraform Plan
        run: terraform plan

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./IaC

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instala Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=stterraformstate12174" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.terraform.tfstate" \
            -backend-config="client_id=${{ secrets.ARM_CLIENT_ID }}" \
            -backend-config="client_secret=${{ secrets.ARM_CLIENT_SECRET }}" \
            -backend-config="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.ARM_TENANT_ID }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve